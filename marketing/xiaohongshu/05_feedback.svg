<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1620" viewBox="0 0 1080 1620">
<defs><style>
.bg{fill:#F2EEDF}.card{fill:rgba(255,255,255,0.70);stroke:rgba(255,255,255,.55);stroke-width:2}.ink{fill:#2A241B}.soft{fill:#5C5345}.grey{fill:#8A8275}.red{fill:#C0532E}.line{stroke:rgba(42,36,27,.18);stroke-width:1}.title{font-family:'STKaiti','Kaiti SC','Songti SC',serif;font-size:82px;font-weight:700}.huge{font-family:'STKaiti','Kaiti SC','Songti SC',serif;font-size:94px;font-weight:700}.body{font-family:'Songti SC','STSong',serif;font-size:42px}.body2{font-family:'Songti SC','STSong',serif;font-size:38px}.small{font-family:'Songti SC','STSong',serif;font-size:32px}.foot{font-family:'Songti SC','STSong',serif;font-size:28px}.mono{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;font-size:36px;font-weight:700}
</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#2A241B" flood-opacity=".06"/></filter></defs>
<rect width="1080" height="1620" class="bg"/>
<rect x="54" y="54" width="972" height="1512" rx="54" class="card" filter="url(#shadow)"/>
<text x="540" y="250" text-anchor="middle" class="huge"><tspan x="540" dy="0">我想听听</tspan><tspan x="540" dy="1.25em">真实反馈</tspan></text><rect x="474" y="500" width="132" height="8" rx="4" class="red"/><rect x="130" y="620" width="820" height="86" rx="24" fill="rgba(255,255,255,.57)" stroke="rgba(42,36,27,.12)"/><text x="180" y="676" text-anchor="start" class="body2 ink"><tspan x="180" dy="0">你的代理软件能识别吗？</tspan></text><rect x="130" y="732" width="820" height="86" rx="24" fill="rgba(255,255,255,.57)" stroke="rgba(42,36,27,.12)"/><text x="180" y="788" text-anchor="start" class="body2 ink"><tspan x="180" dy="0">提示是不是一眼能懂？</tspan></text><rect x="130" y="844" width="820" height="86" rx="24" fill="rgba(255,255,255,.57)" stroke="rgba(42,36,27,.12)"/><text x="180" y="900" text-anchor="start" class="body2 ink"><tspan x="180" dy="0">菜单栏形态顺手吗？</tspan></text><rect x="130" y="956" width="820" height="86" rx="24" fill="rgba(255,255,255,.57)" stroke="rgba(42,36,27,.12)"/><text x="180" y="1012" text-anchor="start" class="body2 ink"><tspan x="180" dy="0">还希望加什么功能？</tspan></text><rect x="130" y="1068" width="820" height="86" rx="24" fill="rgba(255,255,255,.57)" stroke="rgba(42,36,27,.12)"/><text x="180" y="1124" text-anchor="start" class="body2 ink"><tspan x="180" dy="0">有没有误报或奇怪问题？</tspan></text><text x="540" y="1215" text-anchor="middle" class="small grey"><tspan x="540" dy="0">个人 build 的第一个 vibecoding 产品</tspan><tspan x="540" dy="1.25em">不求完美，先求真实有用</tspan></text>
<line x1="118" y1="1478" x2="962" y2="1478" class="line"/>
<text x="118" y="1534" text-anchor="start" class="foot red"><tspan x="118" dy="0">请提意见</tspan></text>
<text x="962" y="1534" text-anchor="end" class="foot grey"><tspan x="962" dy="0">@见林</tspan></text>
</svg>