<rect x="54" y="54" width="972" height="1512" rx="54" class="card" filter="url(#shadow)"/>
<text x="540" y="235" text-anchor="middle" class="title"><tspan x="540" dy="0">为什么做它？</tspan></text><rect x="484" y="326" width="112" height="8" rx="4" class="red"/><rect x="150" y="445" width="780" height="110" rx="28" fill="rgba(255,255,255,.58)" stroke="rgba(42,36,27,.11)"/><circle cx="202" cy="500" r="14" fill="#C0532E"/><text x="245" y="515" text-anchor="start" class="body ink"><tspan x="245" dy="0">Wi-Fi 是不是断了？</tspan></text><rect x="150" y="583" width="780" height="110" rx="28" fill="rgba(255,255,255,.58)" stroke="rgba(42,36,27,.11)"/><circle cx="202" cy="638" r="14" fill="#BA7517"/><text x="245" y="653" text-anchor="start" class="body ink"><tspan x="245" dy="0">路由器是不是不通？</tspan></text><rect x="150" y="721" width="780" height="110" rx="28" fill="rgba(255,255,255,.58)" stroke="rgba(42,36,27,.11)"/><circle cx="202" cy="776" r="14" fill="#C0532E"/><text x="245" y="791" text-anchor="start" class="body ink"><tspan x="245" dy="0">代理软件是不是没开？</tspan></text><rect x="150" y="859" width="780" height="110" rx="28" fill="rgba(255,255,255,.58)" stroke="rgba(42,36,27,.11)"/><circle cx="202" cy="914" r="14" fill="#5C5345"/><text x="245" y="929" text-anchor="start" class="body ink"><tspan x="245" dy="0">节点是不是堵了？</tspan></text><rect x="150" y="997" width="780" height="110" rx="28" fill="rgba(255,255,255,.58)" stroke="rgba(42,36,27,.11)"/><circle cx="202" cy="1052" r="14" fill="#6B7A3A"/><text x="245" y="1067" text-anchor="start" class="body ink"><tspan x="245" dy="0">AI 服务是不是受阻？</tspan></text><text x="540" y="1180" text-anchor="middle" class="title"><tspan x="540" dy="0">以前靠猜</tspan><tspan x="540" dy="1.25em">现在直接看结论</tspan></text>
