<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1620" viewBox="0 0 1080 1620">
<defs><style>
.bg{fill:#F2EEDF}.card{fill:rgba(255,255,255,0.70);stroke:rgba(255,255,255,.55);stroke-width:2}.ink{fill:#2A241B}.soft{fill:#5C5345}.grey{fill:#8A8275}.red{fill:#C0532E}.line{stroke:rgba(42,36,27,.18);stroke-width:1}.title{font-family:'STKaiti','Kaiti SC','Songti SC',serif;font-size:82px;font-weight:700}.huge{font-family:'STKaiti','Kaiti SC','Songti SC',serif;font-size:94px;font-weight:700}.body{font-family:'Songti SC','STSong',serif;font-size:42px}.body2{font-family:'Songti SC','STSong',serif;font-size:38px}.small{font-family:'Songti SC','STSong',serif;font-size:32px}.foot{font-family:'Songti SC','STSong',serif;font-size:28px}.mono{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;font-size:36px;font-weight:700}
</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#2A241B" flood-opacity=".06"/></filter></defs>
