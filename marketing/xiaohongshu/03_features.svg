<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1620" viewBox="0 0 1080 1620">
<defs><style>
.bg{fill:#F2EEDF}.card{fill:rgba(255,255,255,0.70);stroke:rgba(255,255,255,.55);stroke-width:2}.ink{fill:#2A241B}.soft{fill:#5C5345}.grey{fill:#8A8275}.red{fill:#C0532E}.line{stroke:rgba(42,36,27,.18);stroke-width:1}.title{font-family:'STKaiti','Kaiti SC','Songti SC',serif;font-size:82px;font-weight:700}.huge{font-family:'STKaiti','Kaiti SC','Songti SC',serif;font-size:94px;font-weight:700}.body{font-family:'Songti SC','STSong',serif;font-size:42px}.body2{font-family:'Songti SC','STSong',serif;font-size:38px}.small{font-family:'Songti SC','STSong',serif;font-size:32px}.foot{font-family:'Songti SC','STSong',serif;font-size:28px}.mono{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;font-size:36px;font-weight:700}
</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#2A241B" flood-opacity=".06"/></filter></defs>
<rect width="1080" height="1620" class="bg"/>
<rect x="54" y="54" width="972" height="1512" rx="54" class="card" filter="url(#shadow)"/>
<text x="540" y="225" text-anchor="middle" class="title"><tspan x="540" dy="0">它会自动看这些</tspan></text><rect x="475" y="316" width="130" height="8" rx="4" class="red"/><text x="150" y="435" text-anchor="start" class="mono red"><tspan x="150" dy="0">01</tspan></text><text x="240" y="435" text-anchor="start" class="body ink"><tspan x="240" dy="0">路由器</tspan></text><text x="240" y="493" text-anchor="start" class="body2 soft"><tspan x="240" dy="0">先看家里的网络有没有断</tspan></text><text x="150" y="580" text-anchor="start" class="mono red"><tspan x="150" dy="0">02</tspan></text><text x="240" y="580" text-anchor="start" class="body ink"><tspan x="240" dy="0">国内网站</tspan></text><text x="240" y="638" text-anchor="start" class="body2 soft"><tspan x="240" dy="0">判断是不是宽带/运营商异常</tspan></text><text x="150" y="725" text-anchor="start" class="mono red"><tspan x="150" dy="0">03</tspan></text><text x="240" y="725" text-anchor="start" class="body ink"><tspan x="240" dy="0">代理软件</tspan></text><text x="240" y="783" text-anchor="start" class="body2 soft"><tspan x="240" dy="0">自动识别当前是哪款软件</tspan></text><text x="150" y="870" text-anchor="start" class="mono red"><tspan x="150" dy="0">04</tspan></text><text x="240" y="870" text-anchor="start" class="body ink"><tspan x="240" dy="0">代理通道</tspan></text><text x="240" y="928" text-anchor="start" class="body2 soft"><tspan x="240" dy="0">测试代理出口能不能用</tspan></text><text x="150" y="1015" text-anchor="start" class="mono red"><tspan x="150" dy="0">05</tspan></text><text x="240" y="1015" text-anchor="start" class="body ink"><tspan x="240" dy="0">AI 服务</tspan></text><text x="240" y="1073" text-anchor="start" class="body2 soft"><tspan x="240" dy="0">看 ChatGPT / Claude 是否可访问</tspan></text>
<line x1="118" y1="1478" x2="962" y2="1478" class="line"/>
<text x="118" y="1534" text-anchor="start" class="foot red"><tspan x="118" dy="0">功能大白话</tspan></text>
<text x="962" y="1534" text-anchor="end" class="foot grey"><tspan x="962" dy="0">@见林</tspan></text>
